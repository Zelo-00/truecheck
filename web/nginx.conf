server {
    listen 80;
    server_name _;

    # загрузки документов и источников могут быть крупными
    client_max_body_size 64m;

    location /static/ {
        proxy_pass http://app:8000/static/;
        proxy_cache_valid 200 10m;
        expires 7d;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # сверка с ИИ/догрузкой источников бывает долгой
        # HTML не кэшируем — иначе пользователь видит старую страницу со старыми ассетами
        add_header Cache-Control "no-cache" always;
    }
}
