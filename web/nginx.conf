# лимит частоты на дорогой эндпоинт проверки (защита ИИ-ключа от абьюза)
limit_req_zone $binary_remote_addr zone=check:10m rate=20r/m;

# общие security-заголовки (add_header не наследуется в location — подключаем через map нельзя,
# поэтому повторяем директивой include)
server {
    listen 80;
    server_name _;
    client_max_body_size 64m;

    # --- статика: кэшируется (URL версионируются ?v=) ---
    location /static/ {
        proxy_pass http://app:8000/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- дорогой эндпоинт проверки: ограничение частоты ---
    location = /check {
        limit_req zone=check burst=5 nodelay;
        proxy_pass http://app:8000/check;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # ИИ-сверка по эпизодам бывает долгой
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'" always;
    }

    # --- всё остальное (HTML/API) ---
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'" always;
    }
}
