services:
  app:
    build: .
    container_name: truecheck-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      LOG_DIR: /data/logs
    volumes:
      - truecheck_data:/data
      - ./logs:/data/logs        # реальный лог работы виден на хосте: ./logs/app.log
    expose:
      - "8000"

  web:
    image: nginx:1.27-alpine
    container_name: truecheck-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  truecheck_data:
